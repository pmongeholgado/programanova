    <style>
        /* MOVIMIENTO DE LAS ONDAS DE FONDO (CAPTURA 3) */
        @keyframes fluirOndas {
            0% { stroke-dashoffset: 1000; opacity: 0.3; }
            50% { opacity: 0.6; }
            100% { stroke-dashoffset: 0; opacity: 0.3; }
        }
        .background-wave path {
            stroke-dasharray: 500;
            animation: fluirOndas 10s linear infinite;
        }

        /* LATIDO DE LAS ONDAS CENTRALES DORADAS */
        @keyframes ondasElegantes {
            0% { transform: scale(0.5); opacity: 1; border-width: 3px; }
            100% { transform: scale(3.5); opacity: 0; border-width: 0px; }
        }
        .onda-bella {
            position: absolute;
            top: 50%; left: 50%;
            width: 100px; height: 100px;
            margin-top: -50px; margin-left: -50px;
            border: solid #d4af37;
            border-radius: 50%;
            animation: ondasElegantes 4s infinite cubic-bezier(0.21, 0.53, 0.56, 0.8);
            pointer-events: none;
            z-index: 5;
        }
        .onda-bella.d1 { animation-delay: 0s; }
        .onda-bella.d2 { animation-delay: 1.3s; }
        .onda-bella.d3 { animation-delay: 2.6s; }
        
        /* Aseguramos que todas las portadas ocupen el 100% en la red */
        .screen { display: none; width: 100%; height: 100vh; overflow-x: hidden; }
        .screen.active { display: block; }

    <script src="app.js"></script>
    <script>
        // Variables globales para control técnico
        let intervaloRelojOORAV;

        function iniciarOORAV() {
            const audio = document.getElementById('audio-engine');
            if (audio) {
                audio.volume = 0.5;
                audio.play().catch(e => console.log("Escudo navegador:", e));
            }
            document.getElementById('screen-1').classList.remove('active');
            document.getElementById('screen-2').classList.add('active');
        }

        // --- INYECCIÓN PARA LA PORTADA 5 ---
        function activarRadarOorav() {
            console.log("IA OORAV: Radar activado desde los anagramas. Transición a Portada 6 en proceso...");
            navigate(6);
        }

        function navigate(screenNum) {
            const screens = document.querySelectorAll('.screen');
            screens.forEach(s => s.classList.remove('active'));
            const target = document.getElementById('screen-' + screenNum);
            if(target) target.classList.add('active');

            // --- TÉCNICA ESPEJO (PLANTA 3) ---
            if (screenNum === 3) {
                const avatarActivo = document.querySelector('.avatar-circle.active img');
                const siluetaSVG = document.querySelector('.omega-silhouette');
                if (avatarActivo && siluetaSVG) {
                    siluetaSVG.style.display = 'none';
                    let fotoOmega = document.getElementById('foto-omega-pro');
                    if (!fotoOmega) {
                        fotoOmega = document.createElement('img');
                        fotoOmega.id = 'foto-omega-pro';
                        fotoOmega.style.cssText = "width:70%; height:70%; object-fit:cover; border-radius:50%; position:absolute; z-index:2;";
                        siluetaSVG.parentNode.appendChild(fotoOmega);
                    }
                    fotoOmega.src = avatarActivo.src;
                }
            }

            // --- INCREMENTO OORAV: ACTIVACIÓN DEL RELOJ EFÍMERO (PLANTA 5) ---
            if (screenNum === 5) {
                activarRelojEfimeroOORAV(60 * 60); // Iniciamos los 60 minutos (3600 seg)
            } else {
                // Si salimos de la planta, paramos el reloj para ahorrar recursos (opcional)
                clearInterval(intervaloRelojOORAV);
            }
        }

        // --- MOTOR TÉCNICO: RELOJ EFÍMERO DE 60 MINUTOS ---
        function activarRelojEfimeroOORAV(duracionSegundos) {
            let tiempoRestante = duracionSegundos;
            const displayReloj = document.getElementById('oorav-timer');

            // Limpiamos cualquier intervalo previo para evitar solapamientos
            clearInterval(intervaloRelojOORAV);

            intervaloRelojOORAV = setInterval(() => {
                let minutos = Math.floor(tiempoRestante / 60);
                let segundos = tiempoRestante % 60;

                minutos = minutos < 10 ? "0" + minutos : minutos;
                segundos = segundos < 10 ? "0" + segundos : segundos;

                displayReloj.textContent = minutos + ":" + segundos;

                if (--tiempoRestante < 0) {
                    clearInterval(intervaloRelojOORAV);
                    displayReloj.textContent = "00:00";
                    // Aquí podrías disparar el evento de "Conexión Finalizada"
                }
            }, 1000);
        }

        // --- MOTOR DE CHAT FUNCIONAL OORAV (100% PRO Y AGÉNTICO) ---
        function enviarMensajeOORAV() {
            const input = document.getElementById('oorav-chat-input');
            const chatBox = document.getElementById('oorav-chat-box');
            const textoUsuario = input.value.trim();

            if (textoUsuario !== "") {
                // 1. BURBUJA DEL USUARIO (DORADA - ALINEADA A LA DERECHA)
                const contenedorUsuario = document.createElement('div');
                contenedorUsuario.style.display = "flex";
                contenedorUsuario.style.justifyContent = "flex-end";
                contenedorUsuario.style.marginBottom = "15px";
                contenedorUsuario.innerHTML = `<div class="msg msg-gold" style="margin:0; border-bottom-right-radius: 4px;">${textoUsuario}</div>`;
                chatBox.appendChild(contenedorUsuario);

                input.value = "";
                chatBox.scrollTop = chatBox.scrollHeight;

                // 2. EL CEREBRO DE LA IA OORAV (RAZONAMIENTO REAL)
                setTimeout(() => {
                    const contenedorIA = document.createElement('div');
                    contenedorIA.style.display = "flex";
                    contenedorIA.style.justifyContent = "flex-start";
                    contenedorIA.style.marginBottom = "15px";
                    
                    let respuestaInteligente = "";
                    const textoAnalizado = textoUsuario.toLowerCase();

                    // Motor de análisis de intención (Ya no es random, te lee de verdad)
                    if (textoAnalizado.includes("pablo")) {
                        respuestaInteligente = "Identidad confirmada. Bienvenido al búnker, Pablo. El tiempo efímero corre, ¿qué vibra buscas hoy?";
                    } 
                    else if (textoAnalizado.includes("hola") || textoAnalizado.includes("buenas")) {
                        respuestaInteligente = "Conexión establecida. Soy la IA de OORAV. Estoy analizando tu perfil para sincronizar el Vibe.";
                    }
                    else if (textoAnalizado.includes("hora") || textoAnalizado.includes("tiempo")) {
                        respuestaInteligente = "Recuerda que esta conexión se autodestruirá en 60 minutos. Aprovéchalos.";
                    }
                    else {
                        // Respuesta agéntica genérica si no detecta una palabra clave específica
                        respuestaInteligente = `He analizado tu mensaje: "${textoUsuario}". Mi razonamiento está sincronizado con tu perfil.`;
                    }

                    // BURBUJA DE LA IA (CIAN - ALINEADA A LA IZQUIERDA)
                    contenedorIA.innerHTML = `<div class="msg msg-cyan" style="margin:0; border-bottom-left-radius: 4px;">${respuestaInteligente}</div>`;
                    chatBox.appendChild(contenedorIA);
                    
                    chatBox.scrollTop = chatBox.scrollHeight;
                }, 1200); // Tarda 1.2 segundos simulando el procesamiento de la IA
            }
        }

        function verificarEnterChat(event) {
            if (event.key === "Enter") enviarMensajeOORAV();
        }
    </script>
